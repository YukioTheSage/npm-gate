name: Dependency Gate

on:
  pull_request:

jobs:
  npm-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec npm-gate scan --strict --json
        env:
          NPM_GATE_MODE: ci
